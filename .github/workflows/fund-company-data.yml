name: 基金公司数据同步

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因（可选）'
        required: false
        type: string
        default: '手动触发'

env:
  WORKFLOW_NAME: ${{ github.workflow }}
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
  LARK_CHAT_ID: ${{ secrets.LARK_FUND_COMPANY_CHAT_ID }}
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  NOTION_AUTH_TOKEN: ${{ secrets.NOTION_INVESTMENT_AUTH_TOKEN }}
  NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_FUND_COMPANY_DATA_SOURCE_ID }}

jobs:
  run:
    name: 同步数据任务
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 运行任务
        working-directory: schedulers/investment
        run: bun run src/modules/fund-company-data/index.ts
