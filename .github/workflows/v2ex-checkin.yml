name: V2EX 签到

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因（可选）'
        required: false
        type: string
        default: 'Github Actions 页面手动触发'

env:
  WORKFLOW_NAME: ${{ github.workflow }}
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
  V2EX_COOKIE: ${{ secrets.V2EX_COOKIE }}
  LARK_CHAT_ID: ${{ secrets.LARK_V2EX_CHAT_ID }}
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}

jobs:
  run:
    name: 签到任务
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 构建通知模块
        working-directory: packages/notifier
        run: bun run build

      - name: 运行任务
        working-directory: schedulers/v2ex-checkin
        run: bun run src/index.ts
